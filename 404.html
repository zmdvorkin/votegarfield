<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Dvorkin & Brewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-PFL21SKS4G"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-PFL21SKS4G');
</script>
<style>
  :root {
    --purple: #3d1a6e;
    --gold: #c9a84c;
    --gold-light: #e8d5a3;
    --white: #fdfcff;
    --text-muted: #5a4d6e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Cormorant Garamond', Georgia, serif;
    background: var(--purple);
    color: var(--white);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(90, 45, 153, 0.6) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(201, 168, 76, 0.1) 0%, transparent 50%);
  }

  body::after {
    content: '';
    position: absolute;
    top: 2rem; left: 2rem; right: 2rem; bottom: 2rem;
    border: 1px solid rgba(201, 168, 76, 0.15);
    pointer-events: none;
  }

  .inner {
    position: relative;
    z-index: 1;
    max-width: 600px;
  }

  .error-number {
    font-family: 'Playfair Display', serif;
    font-size: clamp(6rem, 20vw, 12rem);
    font-weight: 900;
    line-height: 1;
    color: rgba(201, 168, 76, 0.2);
    letter-spacing: -0.02em;
    margin-bottom: 0.5rem;
    animation: fadeUp 0.8s ease 0.2s both;
  }

  .divider {
    width: 60px;
    height: 1px;
    background: var(--gold);
    margin: 0 auto 1.5rem;
    animation: fadeUp 0.8s ease 0.4s both;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.5rem, 4vw, 2.2rem);
    font-weight: 700;
    color: var(--white);
    margin-bottom: 1rem;
    animation: fadeUp 0.8s ease 0.5s both;
  }

  p {
    font-size: 1.15rem;
    font-style: italic;
    color: var(--gold-light);
    line-height: 1.7;
    margin-bottom: 2.5rem;
    animation: fadeUp 0.8s ease 0.6s both;
  }

  a {
    display: inline-block;
    font-family: 'Libre Baskerville', serif;
    font-size: 0.7rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--purple);
    background: var(--gold);
    padding: 1rem 2.5rem;
    text-decoration: none;
    border: 1px solid var(--gold);
    transition: all 0.25s;
    animation: fadeUp 0.8s ease 0.7s both;
  }

  a:hover {
    background: transparent;
    color: var(--gold);
  }

  .brand {
    position: absolute;
    top: 3rem;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Playfair Display', serif;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--gold-light);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    white-space: nowrap;
    z-index: 1;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
  <div class="brand">Dvorkin &amp; Brewer</div>
  <div class="inner">
    <div class="error-number">404</div>
    <div class="divider"></div>
    <h1>Page Not Found</h1>
    <p>Not everything is on the agenda.</p>
    <a href="/">Back to Home</a>
  </div>
</body>
</html>
